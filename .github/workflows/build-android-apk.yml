name: Build Android Debug APK

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/build-android-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"
          cache-provider: basic

      - name: Restore Firebase configuration
        env:
          FIREBASE_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$FIREBASE_GOOGLE_SERVICES_JSON_BASE64" ]; then
            printf '%s' "$FIREBASE_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > mobile/app/google-services.json
            echo "Firebase configuration restored."
          else
            echo "Firebase configuration secret is not set; building APK without runtime FCM configuration."
          fi

      - name: Build debug APK
        run: gradle -p mobile :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: stock-alert-poc-debug-apk
          path: mobile/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="mobile/app/build/outputs/apk/debug/app-debug.apk"
          if gh release view poc-latest >/dev/null 2>&1; then
            gh release upload poc-latest "$APK" --clobber
          else
            gh release create poc-latest "$APK" \
              --target "$GITHUB_SHA" \
              --title "Latest PoC APK" \
              --notes "Automatically published from the latest successful main build."
          fi
