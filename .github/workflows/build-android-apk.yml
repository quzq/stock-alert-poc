name: Build Android Debug APK

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/build-android-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle -p mobile assembleDebug --stacktrace

      - name: Upload debug APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-alert-poc-debug-apk
          path: mobile/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="mobile/app/build/outputs/apk/debug/app-debug.apk"
          if gh release view poc-latest >/dev/null 2>&1; then
            gh release upload poc-latest "$APK" --clobber
          else
            gh release create poc-latest "$APK" \
              --target "$GITHUB_SHA" \
              --title "Latest PoC APK" \
              --notes "Automatically published from the latest successful main build."
          fi
